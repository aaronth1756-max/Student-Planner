<!DOCTYPE html>
<html>
    <head>
        <title>Register-StudentPlanner</title>
        <style>
            body{
                background-color:#f0f2f5;
                font-family:Arial;
                text-align:center;
            }
            .registerbox{
                width:300px;
                background-color:white;
                margin:100px auto;
                padding:20px;
                border-radius:10px;
                box-shadow:0px 0px 10px gray;
            }
            input{
                width:90%;
                padding:10px;
                margin:8px auto;
            }
            button{
                transition:0.2s;
                background-color:green;
                color:white;
                border:none;
                padding:10px 20px;
                margin:5px 0;
                cursor:pointer;
                border-radius:5px;
            }
            button:hover{
                opacity:0.8;
                transform:scale(1.05);
            }
            a{

                text-decoration:none;
            }
            a:hover{
                opacity:0.8;
            }
            input:focus{
                outline:none;
                border:2px solid blue;
            }

        </style>    
        <script>
            function validateregister(){
                let name=document.getElementById("name").value;
                let email=document.getElementById("email").value;
                let pass=document.getElementById("pass").value;
                let confirmpass=document.getElementById("confirmpass").value;
                if (name===""||email===""||pass===""||confirmpass===""){
                    alert("All fields are required");
                    return
                }  
                if(pass!=confirmpass){
                    alert("passwords do not match");
                    return
                }
                localStorage.setItem("email",email);
                localStorage.setItem("pass",pass);
                localStorage.setItem("name",name);
                alert("Registration successfull");
                window.location.href=("./index.html");
                }
        </script>
    </head>
    <body>       
        <div class="registerbox">
        <h2>Create Account</h2><br>
        <form onsubmit="validateregister(); return false;">
            <input type="text" id="name" placeholder="FullName"><br>
            <input type="email" id="email" placeholder="xxx@gmail.com"><br>
            <input type="password" id="pass" placeholder="Password"><br>
            <input type="password" id="confirmpass" placeholder="Confirm password"><br>
            <button type="button" onclick="validateregister()">Register</button>
            <p>Already Have an Account?<a href="./index.html">Login</a></p>
        </form>
    </div>
    </body>
</html>
